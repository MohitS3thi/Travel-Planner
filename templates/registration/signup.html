{% extends 'base.html' %}

{% block content %}
<div class="hero-banner" style="max-width: 760px; margin: 0 auto 1rem;">
    <h1 style="margin-bottom: 0.2rem;">Create Your Planner Space</h1>
    <p class="muted">Set up your account to build richer trip plans with maps, saved spots, and route ideas.</p>
</div>

<div class="card" style="max-width: 560px; margin: 0 auto; padding: 1.35rem;">
    <h2>Create Account</h2>
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign up</button>
    </form>
    <p class="muted">Already have an account? <a href="{% url 'login' %}">Login</a>.</p>
</div>
{% endblock %}
