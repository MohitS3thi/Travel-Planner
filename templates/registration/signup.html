{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 0 auto;">
    <h1>Create Account</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign up</button>
    </form>
    <p class="muted">Already have an account? <a href="{% url 'login' %}">Login</a>.</p>
</div>
{% endblock %}
