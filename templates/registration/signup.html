{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 0 auto; padding: 1.35rem;">
    <div class="section-heading" style="margin-bottom: 1rem;">
        <h1 style="margin: 0; font-size: 1.7rem;">Create Your Planner Space</h1>
        <span class="section-kicker">Sign up</span>
    </div>
    <p class="muted" style="margin-top: -0.3rem; margin-bottom: 1rem;">Set up your account to build richer trip plans with maps, saved spots, and route ideas.</p>
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign up</button>
    </form>
    <p class="muted">Already have an account? <a href="{% url 'login' %}">Login</a>.</p>
</div>
{% endblock %}
