{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 0 auto; padding: 1.35rem;">
    <div class="section-heading" style="margin-bottom: 1rem;">
        <h1 style="margin: 0; font-size: 1.7rem;">Welcome Back</h1>
        <span class="section-kicker">Login</span>
    </div>
    <p class="muted" style="margin-top: -0.3rem; margin-bottom: 1rem;">Sign in to continue planning routes, saving places, and tracking your itinerary.</p>
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p class="muted">No account yet? <a href="{% url 'signup' %}">Create one</a>.</p>
</div>
{% endblock %}
