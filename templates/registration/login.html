{% extends 'base.html' %}

{% block content %}
<div class="hero-banner" style="max-width: 760px; margin: 0 auto 1rem;">
    <h1 style="margin-bottom: 0.2rem;">Welcome Back</h1>
    <p class="muted">Sign in to continue planning routes, saving places, and tracking your itinerary.</p>
</div>

<div class="card" style="max-width: 500px; margin: 0 auto; padding: 1.35rem;">
    <h2>Login</h2>
    <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p class="muted">No account yet? <a href="{% url 'signup' %}">Create one</a>.</p>
</div>
{% endblock %}
